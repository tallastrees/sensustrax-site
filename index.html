<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENSUS</title>
  <meta name="description" content="SENSUS — Electronic Music" />
  <meta property="og:title" content="SENSUS" />
  <meta property="og:description" content="Electronic Music" />
  <meta property="og:url" content="https://sensustrax.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --off-white: #ede8df;
      --gold: #c8a96e;
      --dim: #2a2a2a;
      --muted: #555;
      --faint: #1a1a1a;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--off-white);
      font-family: 'Space Mono', monospace;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    a { text-decoration: none; color: inherit; }

    /* ─── DESKTOP ─────────────────────────────────────────── */
    .desktop {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4rem 3.5rem 3rem 4.5rem;
      border-right: 0.5px solid var(--dim);
      animation: fadeUp 1s ease both;
    }

    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 9vw, 120px);
      letter-spacing: 0.04em;
      color: var(--off-white);
      line-height: 0.92;
    }

    .wordmark-sub {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 10px;
      margin-left: 3px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .nav-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 0.5px solid var(--dim);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s ease;
      cursor: pointer;
    }

    .nav-link:first-child {
      border-top: 0.5px solid var(--dim);
    }

    .nav-link:hover {
      color: var(--off-white);
    }

    .nav-link:hover .arrow {
      color: var(--gold);
    }

    .nav-link.featured {
      color: var(--gold);
    }

    .nav-link.featured .arrow {
      color: var(--gold);
    }

    .arrow {
      font-size: 11px;
      color: var(--dim);
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .nav-link:hover .arrow {
      transform: translate(2px, -2px);
    }

    .site-footer {
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
    }

    /* ─── RIGHT PANEL ─────────────────────────────────────── */
    .right {
      position: relative;
      overflow: hidden;
      background: var(--faint);
    }

    .art-panel {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Geometric art placeholder — replace with actual artwork */
    .geo-block-a {
      position: absolute;
      top: 0; right: 0;
      width: 65%; height: 55%;
      background: var(--gold);
      opacity: 0.15;
    }

    .geo-block-b {
      position: absolute;
      bottom: 0; left: 0;
      width: 50%; height: 45%;
      border: 0.5px solid var(--dim);
      background: #0f0f0f;
    }

    .geo-circle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 38%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 0.5px solid var(--gold);
      opacity: 0.6;
      animation: rotateSlow 40s linear infinite;
    }

    .geo-circle-inner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 22%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 0.5px solid var(--muted);
      animation: rotateSlow 25s linear infinite reverse;
    }

    .geo-hline {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 0.5px;
      background: var(--dim);
    }

    .geo-vline {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 0.5px;
      background: var(--dim);
    }

    .art-label-vert {
      position: absolute;
      bottom: 2.5rem;
      right: 1.5rem;
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #333;
      writing-mode: vertical-rl;
      font-family: 'Space Mono', monospace;
    }

    .art-label-year {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      font-size: 8px;
      letter-spacing: 0.2em;
      color: #2a2a2a;
      font-family: 'Space Mono', monospace;
    }

    .art-label-coord {
      position: absolute;
      bottom: 1.5rem;
      left: 1.5rem;
      font-size: 8px;
      letter-spacing: 0.1em;
      color: #2a2a2a;
      font-family: 'Space Mono', monospace;
    }

    /* ─── MOBILE ──────────────────────────────────────────── */
    .mobile {
      display: none;
      min-height: 100vh;
      background: var(--black);
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 2rem;
    }

    .mobile-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 0.5px solid var(--gold);
      background: var(--faint);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .mobile-avatar svg {
      width: 28px; height: 28px;
      opacity: 0.4;
    }

    .mobile-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 0.08em;
      color: var(--off-white);
      line-height: 1;
      margin-bottom: 1.75rem;
    }

    .mobile-links {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mobile-btn {
      display: block;
      width: 100%;
      padding: 13px 16px;
      border: 0.5px solid var(--dim);
      background: var(--faint);
      border-radius: 3px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .mobile-btn:hover, .mobile-btn:active {
      border-color: var(--gold);
      color: var(--off-white);
      background: #111;
    }

    .mobile-btn.featured {
      border-color: var(--gold);
      color: var(--gold);
      background: #0f0e0a;
    }

    .mobile-footer {
      margin-top: 2.5rem;
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #2a2a2a;
    }

    /* ─── ANIMATIONS ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes rotateSlow {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* ─── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .desktop { display: none; }
      .mobile { display: flex; }
    }
  </style>
</head>
<body>

  <!-- DESKTOP -->
  <div class="desktop">
    <div class="left">
      <div>
        <h1 class="wordmark">SENSUS</h1>
        <p class="wordmark-sub">Electronic Music</p>
      </div>

      <nav class="nav-links">
        <a class="nav-link featured" href="https://sensus-trax.bandcamp.com/" target="_blank" rel="noopener">
          <span>Bandcamp</span>
          <span class="arrow">↗</span>
        </a>
        <a class="nav-link" href="https://soundcloud.com/sensus-ur-boi" target="_blank" rel="noopener">
          <span>SoundCloud</span>
          <span class="arrow">↗</span>
        </a>
        <a class="nav-link" href="https://open.spotify.com/artist/2HeHiQ4Tq89vUADLkep8o9" target="_blank" rel="noopener">
          <span>Spotify</span>
          <span class="arrow">↗</span>
        </a>
        <a class="nav-link" href="https://music.apple.com/us/artist/sensus/1886438488" target="_blank" rel="noopener">
          <span>Apple Music</span>
          <span class="arrow">↗</span>
        </a>
        <a class="nav-link" href="https://instagram.com/sensus" target="_blank" rel="noopener">
          <span>Instagram</span>
          <span class="arrow">↗</span>
        </a>
      </nav>

      <p class="site-footer">sensustrax.com &nbsp;·&nbsp; Philadelphia</p>
    </div>

    <div class="right">
      <div class="art-panel">
        <div class="geo-block-a"></div>
        <div class="geo-block-b"></div>
        <div class="geo-hline"></div>
        <div class="geo-vline"></div>
        <div class="geo-circle"></div>
        <div class="geo-circle-inner"></div>
        <div class="art-label-year">MMXXVI</div>
        <div class="art-label-vert">Groove · Hypnotic · Underground</div>
        <div class="art-label-coord">39.9526° N · 75.1652° W</div>
      </div>
    </div>
  </div>

  <!-- MOBILE -->
  <div class="mobile">
    <div class="mobile-avatar">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="13" stroke="#c8a96e" stroke-width="0.5"/>
        <circle cx="14" cy="14" r="7" stroke="#c8a96e" stroke-width="0.5"/>
        <circle cx="14" cy="14" r="2" fill="#c8a96e" opacity="0.4"/>
      </svg>
    </div>

    <h1 class="mobile-name">SENSUS</h1>

    <div class="mobile-links">
      <a class="mobile-btn featured" href="https://sensus-trax.bandcamp.com/" target="_blank" rel="noopener">Bandcamp</a>
      <a class="mobile-btn" href="https://soundcloud.com/sensus-ur-boi" target="_blank" rel="noopener">SoundCloud</a>
      <a class="mobile-btn" href="https://open.spotify.com/artist/2HeHiQ4Tq89vUADLkep8o9" target="_blank" rel="noopener">Spotify</a>
      <a class="mobile-btn" href="https://music.apple.com/us/artist/sensus/1886438488" target="_blank" rel="noopener">Apple Music</a>
      <a class="mobile-btn" href="https://instagram.com/sensus" target="_blank" rel="noopener">Instagram</a>
    </div>

    <p class="mobile-footer">sensustrax.com</p>
  </div>

</body>
</html>
