<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENSUS</title>
  <meta name="description" content="SENSUS — Electronic Music" />
  <meta property="og:title" content="SENSUS" />
  <meta property="og:url" content="https://sensustrax.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --terra:   #c0523a;
      --cream:   #f0e8d8;
      --blue:    #3a6fb5;
      --blue-dk: #1a2e4a;
      --blue-md: #223355;
      --muted:   #7a9ab5;
      --faint:   #1e2d42;
      --sand:    #d4b896;
    }
    html, body {
      height: 100%;
      background: var(--blue-dk);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    a { text-decoration: none; color: inherit; }

    /* ── DESKTOP ── */
    .desktop {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3.5rem 3rem 3rem 4rem;
      background: var(--blue-dk);
      position: relative;
      z-index: 2;
      animation: fadeUp 0.9s cubic-bezier(.22,.68,0,1.2) both;
    }
    .left::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 1px; height: 100%;
      background: linear-gradient(to bottom, transparent, var(--terra) 30%, var(--terra) 70%, transparent);
      opacity: 0.5;
    }

    .wordmark {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(52px, 7.5vw, 100px);
      letter-spacing: -0.02em;
      color: var(--cream);
      line-height: 0.95;
    }
    .wordmark-dot {
      display: inline-block;
      width: clamp(8px, 1.2vw, 16px);
      height: clamp(8px, 1.2vw, 16px);
      border-radius: 50%;
      background: var(--terra);
      margin-left: 4px;
      vertical-align: middle;
      position: relative;
      top: -4px;
      animation: pulse 3s ease-in-out infinite;
    }
    .wordmark-sub {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 12px;
      font-weight: 300;
    }

    .nav-links { display: flex; flex-direction: column; }
    .nav-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid var(--faint);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.25s, padding-left 0.25s;
    }
    .nav-link:first-child { border-top: 1px solid var(--faint); }
    .nav-link:hover { color: var(--cream); padding-left: 6px; }
    .nav-link.featured { color: var(--terra); }
    .nav-link.featured:hover { color: var(--sand); }
    .arrow { font-size: 14px; transition: transform 0.25s; opacity: 0.5; }
    .nav-link:hover .arrow { transform: translate(3px, -3px); opacity: 1; }

    .site-footer {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2a3d55;
      font-weight: 300;
    }

    /* RIGHT PANEL */
    .right { position: relative; overflow: hidden; }
    .right img.art {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
      filter: saturate(1.05) contrast(1.05) brightness(0.92);
    }
    .right-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, var(--blue-dk) 0%, transparent 14%);
      pointer-events: none;
    }
    .right-label {
      position: absolute;
      bottom: 2rem; right: 1.5rem;
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(240,232,216,0.2);
      writing-mode: vertical-rl;
    }

    /* ── MOBILE ── */
    .mobile {
      display: none;
      min-height: 100vh;
      position: relative;
      flex-direction: column;
      align-items: center;
      padding: 3.5rem 1.5rem 2.5rem;
      overflow: hidden;
    }
    .mobile-bg {
      position: absolute; inset: 0;
      background-image: url('background.png');
      background-size: cover;
      background-position: center;
      filter: brightness(0.55) saturate(0.9);
      z-index: 0;
    }
    .mobile-bg-overlay {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(26,46,74,0.3) 0%, rgba(26,46,74,0.82) 100%);
      z-index: 1;
    }
    .mobile-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; width: 100%;
    }
    .mobile-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--terra);
      margin-bottom: 1rem;
      animation: pulse 3s ease-in-out infinite;
    }
    .mobile-name {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: 36px;
      letter-spacing: -0.02em;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 0.4rem;
    }
    .mobile-sub {
      font-size: 8px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.25rem;
      font-weight: 300;
    }
    .mobile-links {
      width: 100%; max-width: 320px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* BUTTONS */
    .mobile-btn-wrap {
      position: relative;
      display: block;
      width: 100%;
    }
    .mobile-btn-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: #0a0e14;
      transform: translate(5px, 6px);
      z-index: 0;
      transition: transform 0.15s ease;
    }
    .mobile-btn-wrap:active::before {
      transform: translate(2px, 3px);
    }
    .mobile-btn {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      padding: 16px 20px;
      border-radius: 18px;
      border: 2.5px solid #0a0e14;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E"),
        linear-gradient(135deg, #f5ede0 0%, #ede3d0 100%);
      background-size: 180px 180px, 100%;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #1a2e4a;
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .mobile-btn:hover  { transform: translate(-1px, -1px); }
    .mobile-btn:active { transform: translate(3px, 3px); }

    .mobile-btn.featured {
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E"),
        linear-gradient(135deg, #c8573d 0%, #b84a30 100%);
      color: var(--cream);
      border-color: #0a0e14;
    }

    .mobile-footer {
      margin-top: 2.5rem;
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2a3d55;
      font-weight: 300;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .desktop { display: none; }
      .mobile  { display: flex; }
    }
  </style>
</head>
<body>

  <!-- DESKTOP -->
  <div class="desktop">
    <div class="left">
      <div>
        <h1 class="wordmark">SENSUS<span class="wordmark-dot"></span></h1>
        <p class="wordmark-sub">Electronic Music</p>
      </div>
      <nav class="nav-links">
        <a class="nav-link featured" href="https://sensus-trax.bandcamp.com/" target="_blank" rel="noopener">
          <span>Bandcamp</span><span class="arrow">↗</span>
        </a>
        <a class="nav-link" href="https://soundcloud.com/sensus-ur-boi" target="_blank" rel="noopener">
          <span>SoundCloud</span><span class="arrow">↗</span>
        </a>
        <a class="nav-link" href="https://open.spotify.com/artist/2HeHiQ4Tq89vUADLkep8o9" target="_blank" rel="noopener">
          <span>Spotify</span><span class="arrow">↗</span>
        </a>
        <a class="nav-link" href="https://music.apple.com/us/artist/sensus/1886438488" target="_blank" rel="noopener">
          <span>Apple Music</span><span class="arrow">↗</span>
        </a>
        <a class="nav-link" href="https://instagram.com/sensus" target="_blank" rel="noopener">
          <span>Instagram</span><span class="arrow">↗</span>
        </a>
      </nav>
      <p class="site-footer">sensustrax.com &nbsp;·&nbsp; Philadelphia</p>
    </div>
    <div class="right">
      <img class="art" src="background.png" alt="Sensus" />
      <div class="right-overlay"></div>
      <div class="right-label">sensustrax.com</div>
    </div>
  </div>

  <!-- MOBILE -->
  <div class="mobile">
    <div class="mobile-bg"></div>
    <div class="mobile-bg-overlay"></div>
    <div class="mobile-content">
      <div class="mobile-dot"></div>
      <h1 class="mobile-name">SENSUS</h1>
      <p class="mobile-sub">Electronic Music</p>
      <div class="mobile-links">
        <div class="mobile-btn-wrap featured">
          <a class="mobile-btn featured" href="https://sensus-trax.bandcamp.com/" target="_blank" rel="noopener">Bandcamp</a>
        </div>
        <div class="mobile-btn-wrap">
          <a class="mobile-btn" href="https://soundcloud.com/sensus-ur-boi" target="_blank" rel="noopener">SoundCloud</a>
        </div>
        <div class="mobile-btn-wrap">
          <a class="mobile-btn" href="https://open.spotify.com/artist/2HeHiQ4Tq89vUADLkep8o9" target="_blank" rel="noopener">Spotify</a>
        </div>
        <div class="mobile-btn-wrap">
          <a class="mobile-btn" href="https://music.apple.com/us/artist/sensus/1886438488" target="_blank" rel="noopener">Apple Music</a>
        </div>
        <div class="mobile-btn-wrap">
          <a class="mobile-btn" href="https://instagram.com/sensus" target="_blank" rel="noopener">Instagram</a>
        </div>
      </div>
      <p class="mobile-footer">sensustrax.com</p>
    </div>
  </div>

</body>
</html>
